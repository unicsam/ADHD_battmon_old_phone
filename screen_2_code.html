<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Battery Warning Dialog</title>
<!-- Load Tailwind CSS v3 with required plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-layout">
    /* Custom height to ensure full viewport coverage on mobile */
    .full-height {
      height: 100vh;
      height: 100svh;
    }
  </style>
</head>
<body class="flex items-center justify-center p-6 full-height font-sans bg-yellow-400">
<!-- BEGIN: WarningDialogContainer -->
<main class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden flex flex-col items-center text-center p-8" data-purpose="battery-warning-modal" id="warning-dialog">
<!-- BEGIN: IconSection -->
<div class="mb-6" data-purpose="status-icon">
<!-- Replicating the red triangle warning icon from the reference image -->
<svg class="w-20 h-20 text-red-600" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2L1 21h22L12 2zm0 3.99L19.53 19H4.47L12 5.99zM11 16h2v2h-2v-2zm0-6h2v4h-2v-4z"></path>
</svg>
</div>
<!-- END: IconSection -->
<!-- BEGIN: ContentSection -->
<section class="space-y-2 mb-8" data-purpose="dialog-text-content">
<h1 class="text-2xl font-bold text-gray-900 tracking-tight">
        Low Battery
      </h1>
<div class="text-gray-500 text-sm leading-relaxed px-4">
<p>Your battery is low.</p>
<p>Please connect a charger.</p>
</div>
</section>
<!-- END: ContentSection -->
<!-- BEGIN: ActionSection -->
<footer class="w-full" data-purpose="dialog-actions">
<!-- The button is styled to look like the subtle, integrated button in the reference image -->
<button class="w-full py-4 bg-gray-50 hover:bg-gray-100 text-blue-500 font-semibold text-lg rounded-xl transition-colors duration-200 uppercase tracking-wide" onclick="this.closest('#warning-dialog').style.display='none'" type="button">
        OK
      </button>
</footer>
<!-- END: ActionSection -->
</main>
<!-- END: WarningDialogContainer -->
</body></html>
